<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ─── PHOTO STORE (IndexedDB) ────────────────────────────────────────────── */
const PS=(()=>{
  let _db=null;
  const cache=new Map();
  const open=()=>new Promise((res,rej)=>{
    if(_db)return res(_db);
    const r=indexedDB.open('cv_photos_v1',1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore('p',{keyPath:'id'});
    r.onsuccess=e=>{_db=e.target.result;res(_db);};
    r.onerror=()=>rej(r.error);
  });
  const tx=(mode='readonly')=>_db.transaction('p',mode).objectStore('p');
  const save=async(id,data,name='')=>{
    await open();cache.set(id,data);
    return new Promise((res,rej)=>{const t=tx('readwrite');t.put({id,data,name});t.transaction.oncomplete=()=>res(id);t.transaction.onerror=()=>rej();});
  };
  const get=async id=>{
    if(cache.has(id))return cache.get(id);
    await open();
    return new Promise(res=>{const r=tx().get(id);r.onsuccess=()=>{const d=r.result?.data;if(d)cache.set(id,d);res(d||null);};r.onerror=()=>res(null);});
  };
  const getFull=async id=>{
    await open();
    return new Promise(res=>{const r=tx().get(id);r.onsuccess=()=>res(r.result||null);r.onerror=()=>res(null);});
  };
  const del=async id=>{
    cache.delete(id);await open();
    return new Promise(res=>{const t=tx('readwrite');t.delete(id);t.transaction.oncomplete=()=>res();});
  };
  const getAll=async()=>{
    await open();
    return new Promise(res=>{const r=tx().getAll();r.onsuccess=()=>{const rows=r.result||[];rows.forEach(p=>cache.set(p.id,p.data));res(rows);};r.onerror=()=>res([]);});
  };
  const getSize=async()=>{
    await open();
    return new Promise(res=>{const r=tx().getAll();r.onsuccess=()=>{const rows=r.result||[];const bytes=rows.reduce((a,p)=>a+(p.data?.length||0),0);res(Math.round(bytes*0.75/1024/1024*10)/10);};r.onerror=()=>res(0);});
  };
  return{save,get,getFull,del,getAll,getSize,cache};
})();

/* ─── PHOTO COMPRESSION ─────────────────────────────────────────────────── */
async function compressImage(file,maxPx=1280,quality=0.82){
  return new Promise(res=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let{width:w,height:h}=img;
      if(w>maxPx||h>maxPx){const r=Math.min(maxPx/w,maxPx/h);w=Math.round(w*r);h=Math.round(h*r);}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>{URL.revokeObjectURL(url);const r2=new FileReader();r2.onload=e=>res(e.target.result);r2.readAsDataURL(file);};
    img.src=url;
  });
}

/* ─── SAVE TO GALLERY ───────────────────────────────────────────────────── */
async function savePhotoToGallery(dataUrl,filename){
  try{
    // Try Web Share API (best on mobile — uses native share sheet → save to photos)
    const blob=await(await fetch(dataUrl)).blob();
    const file=new File([blob],filename,{type:'image/jpeg'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'ThermoVisit — Salvar foto'});
      return 'shared';
    }
  }catch(e){if(e.name!=='AbortError'&&e.name!=='NotAllowedError'){/* fall through */}}
  // Fallback: download link (browser saves to Downloads, user moves to gallery)
  const a=document.createElement('a');a.href=dataUrl;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  return 'downloaded';
}

async function saveAllPhotosToGallery(photoIds,prefix,onProgress){
  let saved=0;
  for(const id of photoIds){
    const data=await PS.get(id);
    if(!data)continue;
    const ts=new Date().toISOString().replace(/[-:T]/g,'').slice(0,15);
    const filename=`thermovisit_${prefix}_${ts}_${saved+1}.jpg`;
    const a=document.createElement('a');a.href=data;a.download=filename;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    saved++;
    if(onProgress)onProgress(saved,photoIds.length);
    await new Promise(r=>setTimeout(r,400));
  }
  return saved;
}

/* ─── STORAGE ────────────────────────────────────────────────────────────── */
const SK='cv_v4';
const uuid=()=>crypto.randomUUID?crypto.randomUUID():`${Date.now()}-${Math.random().toString(36).slice(2)}`;
function loadData(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}}
function saveData(d){try{localStorage.setItem(SK,JSON.stringify(d));return true;}catch{return false;}}
function markBackup(){localStorage.setItem('cv_last_backup',new Date().toISOString());localStorage.removeItem('cv_backup_snooze_until');}
function getLastBackup(){return localStorage.getItem('cv_last_backup');}
function snoozeBackupReminder(hours=3){localStorage.setItem('cv_backup_snooze_until',new Date(Date.now()+hours*60*60*1000).toISOString());}
function getBackupSnooze(){return localStorage.getItem('cv_backup_snooze_until');}
const CLOUD_CFG_KEY='cv_cloud_cfg_v1';
const CLOUD_SYNC_URL='/api/sync';
function loadCloudCfg(){
  try{
    const raw=localStorage.getItem(CLOUD_CFG_KEY);
    if(!raw)return{workspace:'principal',syncKey:'',autoSync:true};
    const cfg=JSON.parse(raw)||{};
    return{workspace:cfg.workspace||'principal',syncKey:cfg.syncKey||'',autoSync:cfg.autoSync!==false};
  }catch{return{workspace:'principal',syncKey:'',autoSync:true};}
}
function persistCloudCfg(cfg){
  try{localStorage.setItem(CLOUD_CFG_KEY,JSON.stringify({workspace:(cfg.workspace||'principal').trim()||'principal',syncKey:(cfg.syncKey||'').trim(),autoSync:cfg.autoSync!==false}));return true;}catch{return false;}
}
function normalizeDataState(s){
  const normalized=s?{...INIT,...s,leads:s.leads||[],commissions:s.commissions||[],referrals:s.referrals||[],company:s.company||INIT.company,representative:s.representative||INIT.representative,customStatusTypes:s.customStatusTypes||INIT.customStatusTypes}:INIT;
  const meta=s?._meta||{};
  return{...normalized,_meta:{schemaVersion:5,localUpdatedAt:meta.localUpdatedAt||meta.cloudUpdatedAt||new Date().toISOString(),cloudUpdatedAt:meta.cloudUpdatedAt||null,lastCloudPullAt:meta.lastCloudPullAt||null,lastCloudPushAt:meta.lastCloudPushAt||null}};
}
function stampDataState(next,prev){
  const prevMeta=prev?._meta||{};
  const nextMeta=next?._meta||{};
  return{...next,_meta:{...prevMeta,...nextMeta,schemaVersion:5,localUpdatedAt:new Date().toISOString()}};
}
function getInitialPage(){
  try{
    const p=new URLSearchParams(window.location.search).get('page');
    return ['home','clientForm','clients','visits','products','productForm','orders','orderForm','reports','empresa'].includes(p)?p:'home';
  }catch{return 'home';}
}
function getReferencedPhotoIds(d){
  const ids=new Set();
  (d.products||[]).forEach(p=>{(p.photoIds||[]).forEach(id=>ids.add(id));});
  (d.clients||[]).forEach(c=>{(c.environments||[]).forEach(e=>{(e.photoIds||[]).forEach(id=>ids.add(id));(e.furnace?.photoIds||[]).forEach(id=>ids.add(id));});});
  return ids;
}

/* ─── INIT ───────────────────────────────────────────────────────────────── */
const INIT={
  categories:[{id:'1',name:'Produtor Rural',desc:''},{id:'2',name:'Hotel / Pousada',desc:''},{id:'3',name:'Restaurante / Pizzaria',desc:''},{id:'4',name:'Indústria',desc:''},{id:'5',name:'Outros',desc:''}],
  envTypes:[{id:'1',name:'Estufa de Fumo'},{id:'2',name:'Secador de Grãos'},{id:'3',name:'Piscina'},{id:'4',name:'Forno'},{id:'5',name:'Defumador'},{id:'6',name:'Caldeira'},{id:'7',name:'Sauna'},{id:'8',name:'Aviário'},{id:'9',name:'Tanque de Peixe'}],
  productCategories:[{id:'1',name:'Aviário'},{id:'2',name:'Equipamentos'},{id:'3',name:'Fumageiro'},{id:'4',name:'Piscicultura'},{id:'5',name:'Secador de Grãos'}],
  customStatusTypes:[{id:'1',label:'Financiamento em análise'},{id:'2',label:'Aguardando proposta'},{id:'3',label:'Proposta enviada'},{id:'4',label:'Negociação em andamento'}],
  products:[],clients:[],visits:[],orders:[],
  referrals:[],leads:[],commissions:[],
  company:{name:'',cnpj:'',phone:'',bankName:'',bankAgency:'',bankAccount:'',bankPix:'',address:'',tiktok:'',facebook:'',instagram:'',x:'',linkedin:''},
  representative:{name:'',cities:[]},
};

/* ─── STORE ──────────────────────────────────────────────────────────────── */
function useStore(){
  const [data,setData]=useState(()=>normalizeDataState(loadData()));
  const [toast,setToast]=useState(null);
  const ti=useRef(null);
  const st=useRef(null);
  const dataRef=useRef(data);
  const cloudTimer=useRef(null);
  const [cloudCfg,setCloudCfg]=useState(loadCloudCfg);
  const [syncState,setSyncState]=useState({ready:false,enabled:false,busy:false,lastPush:null,lastPull:null,remoteUpdatedAt:null,error:null});

  useEffect(()=>{dataRef.current=data;},[data]);

  const showToast=m=>{setToast(m);clearTimeout(ti.current);ti.current=setTimeout(()=>setToast(null),3000)};

  useEffect(()=>{
    clearTimeout(st.current);
    st.current=setTimeout(()=>{
      if(!saveData(dataRef.current))showToast('⚠️ Falha ao salvar os dados no dispositivo. Libere espaço e tente novamente.');
    },500);
    return()=>clearTimeout(st.current);
  },[data]);

  const saveCloudConfig=cfg=>{
    const next={workspace:(cfg.workspace||'principal').trim()||'principal',syncKey:(cfg.syncKey||'').trim(),autoSync:cfg.autoSync!==false};
    if(!persistCloudCfg(next)){
      showToast('⚠️ Não foi possível salvar a configuração da nuvem.');
      return false;
    }
    setCloudCfg(next);
    setSyncState(s=>({...s,enabled:!!next.syncKey,error:null}));
    showToast('✅ Configuração da nuvem salva.');
    return true;
  };

  const cloudRequest=useCallback(async(method='GET',payload=null)=>{
    if(!cloudCfg.syncKey)throw new Error('missing-sync-key');
    const workspace=encodeURIComponent(cloudCfg.workspace||'principal');
    const res=await fetch(`${CLOUD_SYNC_URL}?workspace=${workspace}`,{
      method,
      headers:{'Content-Type':'application/json','x-app-key':cloudCfg.syncKey,'x-workspace':cloudCfg.workspace||'principal'},
      body:payload?JSON.stringify(payload):undefined
    });
    const json=await res.json().catch(()=>({}));
    if(!res.ok)throw new Error(json.error||'cloud-request-failed');
    return json;
  },[cloudCfg]);

  const pullFromCloud=useCallback(async({silent=false}={})=>{
    if(!cloudCfg.syncKey){if(!silent)showToast('⚠️ Configure a chave de sincronização primeiro.');return null;}
    setSyncState(s=>({...s,busy:true,enabled:true,error:null}));
    try{
      const remote=await cloudRequest('GET');
      if(remote?.payload){
        const normalized=normalizeDataState({...remote.payload,_meta:{...(remote.payload._meta||{}),cloudUpdatedAt:remote.updatedAt||null,lastCloudPullAt:new Date().toISOString()}});
        setData(normalized);
        saveData(normalized);
      }
      setSyncState(s=>({...s,busy:false,ready:true,enabled:true,lastPull:new Date().toISOString(),remoteUpdatedAt:remote?.updatedAt||null,error:null}));
      if(!silent)showToast(remote?.payload?'✅ Dados baixados da nuvem.':'ℹ️ Nenhum backup em nuvem encontrado ainda.');
      return remote;
    }catch(err){
      setSyncState(s=>({...s,busy:false,ready:true,enabled:!!cloudCfg.syncKey,error:err.message||'cloud-pull-failed'}));
      if(!silent)showToast('⚠️ Não foi possível baixar os dados da nuvem.');
      return null;
    }
  },[cloudCfg.syncKey,cloudRequest]);

  const pushToCloud=useCallback(async(payload=dataRef.current,{silent=false}={})=>{
    if(!cloudCfg.syncKey){if(!silent)showToast('⚠️ Configure a chave de sincronização primeiro.');return null;}
    setSyncState(s=>({...s,busy:true,enabled:true,error:null}));
    try{
      const stamped={...payload,_meta:{...(payload._meta||{}),lastCloudPushAt:new Date().toISOString()}};
      const result=await cloudRequest('POST',{payload:stamped});
      setData(prev=>normalizeDataState({...stamped,_meta:{...(stamped._meta||{}),cloudUpdatedAt:result?.updatedAt||new Date().toISOString()}}));
      setSyncState(s=>({...s,busy:false,ready:true,enabled:true,lastPush:new Date().toISOString(),remoteUpdatedAt:result?.updatedAt||null,error:null}));
      if(!silent)showToast('✅ Dados enviados para a nuvem.');
      return result;
    }catch(err){
      setSyncState(s=>({...s,busy:false,ready:true,enabled:!!cloudCfg.syncKey,error:err.message||'cloud-push-failed'}));
      if(!silent)showToast('⚠️ Não foi possível enviar os dados para a nuvem.');
      return null;
    }
  },[cloudCfg.syncKey,cloudRequest]);

  useEffect(()=>{
    let active=true;
    (async()=>{
      if(!cloudCfg.syncKey){setSyncState(s=>({...s,ready:true,enabled:false,busy:false,error:null}));return;}
      setSyncState(s=>({...s,ready:false,enabled:true,busy:true,error:null}));
      const remote=await cloudRequest('GET').catch(err=>({error:err.message||'cloud-bootstrap-failed'}));
      if(!active)return;
      if(remote?.error){
        setSyncState(s=>({...s,ready:true,enabled:true,busy:false,error:remote.error}));
        return;
      }
      const localTs=dataRef.current?._meta?.localUpdatedAt?new Date(dataRef.current._meta.localUpdatedAt).getTime():0;
      const remoteTs=remote?.updatedAt?new Date(remote.updatedAt).getTime():0;
      if(remote?.payload&&remoteTs>localTs){
        const normalized=normalizeDataState({...remote.payload,_meta:{...(remote.payload._meta||{}),cloudUpdatedAt:remote.updatedAt,lastCloudPullAt:new Date().toISOString()}});
        setData(normalized);
        saveData(normalized);
        setSyncState(s=>({...s,ready:true,enabled:true,busy:false,lastPull:new Date().toISOString(),remoteUpdatedAt:remote.updatedAt,error:null}));
      }else{
        setSyncState(s=>({...s,ready:true,enabled:true,busy:false,remoteUpdatedAt:remote?.updatedAt||null,error:null}));
        const hasLocalContent=(dataRef.current.clients?.length||dataRef.current.products?.length||dataRef.current.orders?.length||dataRef.current.visits?.length||dataRef.current.leads?.length||dataRef.current.referrals?.length||dataRef.current.commissions?.length)>0;
        if(hasLocalContent&&(localTs>=remoteTs||!remote?.payload))pushToCloud(dataRef.current,{silent:true});
      }
    })();
    return()=>{active=false;};
  },[cloudCfg.workspace,cloudCfg.syncKey]);

  useEffect(()=>{
    if(!cloudCfg.syncKey||cloudCfg.autoSync===false||!syncState.ready||!navigator.onLine)return;
    clearTimeout(cloudTimer.current);
    cloudTimer.current=setTimeout(()=>{pushToCloud(dataRef.current,{silent:true});},1800);
    return()=>clearTimeout(cloudTimer.current);
  },[data,cloudCfg.syncKey,cloudCfg.autoSync,syncState.ready,pushToCloud]);

  const cleanupOrphanPhotos=async()=>{
    const refs=getReferencedPhotoIds(dataRef.current);
    const rows=await PS.getAll();
    let removed=0;
    for(const row of rows){if(!refs.has(row.id)){await PS.del(row.id);removed++;}}
    if(removed>0)showToast(`🧹 ${removed} foto(s) órfã(s) removida(s).`); else showToast('✅ Nenhuma foto órfã encontrada.');
    return removed;
  };

  const up=fn=>setData(prev=>stampDataState(fn(prev),prev));

  // categories/types
  const addCat=c=>up(d=>({...d,categories:[...d.categories,{...c,id:uuid()}]}));
  const editCat=(id,c)=>up(d=>({...d,categories:d.categories.map(x=>x.id===id?{...x,...c}:x)}));
  const delCat=id=>up(d=>({...d,categories:d.categories.filter(x=>x.id!==id)}));
  const addET=t=>up(d=>({...d,envTypes:[...d.envTypes,{...t,id:uuid()}]}));
  const editET=(id,t)=>up(d=>({...d,envTypes:d.envTypes.map(x=>x.id===id?{...x,...t}:x)}));
  const delET=id=>up(d=>({...d,envTypes:d.envTypes.filter(x=>x.id!==id)}));
  const addPC=c=>up(d=>({...d,productCategories:[...d.productCategories,{...c,id:uuid()}]}));
  const editPC=(id,c)=>up(d=>({...d,productCategories:d.productCategories.map(x=>x.id===id?{...x,...c}:x)}));
  const delPC=id=>up(d=>({...d,productCategories:d.productCategories.filter(x=>x.id!==id)}));
  const addCST=t=>up(d=>({...d,customStatusTypes:[...d.customStatusTypes,{...t,id:uuid()}]}));
  const editCST=(id,t)=>up(d=>({...d,customStatusTypes:d.customStatusTypes.map(x=>x.id===id?{...x,...t}:x)}));
  const delCST=id=>up(d=>({...d,customStatusTypes:d.customStatusTypes.filter(x=>x.id!==id)}));

  // products
  const addProduct=p=>up(d=>({...d,products:[...d.products,{...p,id:uuid()}]}));
  const editProduct=(id,p)=>up(d=>({...d,products:d.products.map(x=>x.id===id?{...x,...p}:x)}));
  const delProduct=id=>up(d=>({...d,products:d.products.filter(x=>x.id!==id)}));

  // clients
  const addClient=c=>up(d=>({...d,clients:[...d.clients,{...c,id:uuid(),environments:[],activityStatus:{hasEquip:false,bioPellets:false,cavaco:false,briquete:false,pellets:false,customFlags:{},custom:''}}]}));
  const editClient=(id,c)=>up(d=>({...d,clients:d.clients.map(x=>x.id===id?{...x,...c}:x)}));
  const delClient=id=>up(d=>{const orderIds=d.orders.filter(o=>o.clientId===id).map(o=>o.id);return{...d,clients:d.clients.filter(x=>x.id!==id),visits:d.visits.filter(v=>v.clientId!==id),orders:d.orders.filter(o=>o.clientId!==id),commissions:d.commissions.filter(c=>!orderIds.includes(c.orderId))};});

  // environments
  const addEnv=(cid,e)=>up(d=>{
    const cl=d.clients.find(c=>c.id===cid);
    const et=d.envTypes.find(t=>t.id===e.typeId);
    const same=cl.environments.filter(x=>x.typeId===e.typeId).length;
    return{...d,clients:d.clients.map(c=>c.id===cid?{...c,environments:[...c.environments,{...e,id:uuid(),label:`${et?.name||'Ambiente'} ${same+1}`}]}:c)};
  });
  const editEnv=(cid,eid,e)=>up(d=>({...d,clients:d.clients.map(c=>c.id===cid?{...c,environments:c.environments.map(x=>x.id===eid?{...x,...e}:x)}:c)}));
  const delEnv=(cid,eid)=>up(d=>({...d,clients:d.clients.map(c=>c.id===cid?{...c,environments:c.environments.filter(e=>e.id!==eid)}:c)}));

  const updateStatus=(cid,s)=>up(d=>({...d,clients:d.clients.map(c=>c.id===cid?{...c,activityStatus:{...c.activityStatus,...s}}:c)}));

  // visits
  const addVisit=v=>up(d=>({...d,visits:[{...v,id:uuid()},...d.visits]}));
  const delVisit=id=>up(d=>({...d,visits:d.visits.filter(v=>v.id!==id)}));

  // orders — auto-create commission when status→pago
  const addOrder=o=>up(d=>({...d,orders:[{...o,id:uuid(),date:new Date().toISOString()},...d.orders]}));
  const editOrder=(id,o)=>up(d=>{
    const old=d.orders.find(x=>x.id===id);
    const newOrders=d.orders.map(x=>x.id===id?{...x,...o}:x);
    let newComm=[...d.commissions];
    // auto-commission when paid with a referral
    if(o.status==='pago'&&old?.status!=='pago'&&o.referralId){
      const ref=d.referrals.find(r=>r.id===o.referralId);
      const cl=d.clients.find(c=>c.id===o.clientId);
      const already=d.commissions.find(c=>c.orderId===id);
      if(!already&&ref){
        newComm=[{
          id:uuid(),referralId:o.referralId,referralName:ref.name,
          orderId:id,clientId:o.clientId,clientName:cl?.name||'—',
          amount:ref.commission||0,status:'pendente',
          createdAt:new Date().toISOString(),paidAt:null,
          orderDate:old?.date,orderTotal:o.total
        },...newComm];
      }
    }
    return{...d,orders:newOrders,commissions:newComm};
  });
  const delOrder=id=>up(d=>({...d,orders:d.orders.filter(x=>x.id!==id),commissions:d.commissions.filter(c=>c.orderId!==id)}));

  // referrals
  const addReferral=r=>up(d=>({...d,referrals:[{...r,id:uuid()},...d.referrals]}));
  const editReferral=(id,r)=>up(d=>({...d,referrals:d.referrals.map(x=>x.id===id?{...x,...r}:x)}));
  const delReferral=id=>up(d=>({...d,referrals:d.referrals.filter(x=>x.id!==id),orders:d.orders.map(o=>o.referralId===id?{...o,referralId:null}:o),leads:d.leads.map(l=>l.referralId===id?{...l,referralId:null}:l)}));

  // leads (pre-cadastros)
  const addLead=l=>up(d=>({...d,leads:[{...l,id:uuid(),createdAt:new Date().toISOString(),status:'active',convertedClientId:null},...d.leads]}));
  const editLead=(id,l)=>up(d=>({...d,leads:d.leads.map(x=>x.id===id?{...x,...l}:x)}));
  const delLead=id=>up(d=>({...d,leads:d.leads.filter(x=>x.id!==id)}));
  const convertLead=(leadId)=>{
    let newClientId=null;
    up(d=>{
      const lead=d.leads.find(l=>l.id===leadId);if(!lead)return d;
      newClientId=uuid();
      const newClient={id:newClientId,name:lead.name,phone1:lead.phone,phone2:'',categoryId:'',city:'',neighborhood:'',address:lead.reference||'',lat:lead.lat||0,lng:lead.lng||0,mapsLink:lead.lat?`https://maps.google.com/?q=${lead.lat},${lead.lng}`:'',notes:`Convertido de pré-cadastro. Referência: ${lead.reference||''}. Indicado por: ${lead.referralName||d.referrals.find(r=>r.id===lead.referralId)?.name||'—'}`,environments:[],activityStatus:{hasEquip:false,bioPellets:false,cavaco:false,briquete:false,pellets:false,customFlags:{},custom:''}};
      return{...d,clients:[...d.clients,newClient],leads:d.leads.map(l=>l.id===leadId?{...l,status:'converted',convertedClientId:newClientId}:l)};
    });
    return newClientId;
  };

  // commissions
  const payCommission=id=>up(d=>({...d,commissions:d.commissions.map(c=>c.id===id?{...c,status:'paga',paidAt:new Date().toISOString()}:c)}));

  // company
  const saveCompany=c=>up(d=>({...d,company:{...d.company,...c}}));
  const saveRepresentative=r=>up(d=>({...d,representative:{...d.representative,...r}}));

  // backup
  const _dl=(blob,filename)=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),2000);};
  const exportBackup=async(withPhotos=true)=>{
    const dateStr=new Date().toISOString().split('T')[0];
    if(withPhotos){
      showToast('⏳ Preparando backup completo...');
      const photos=await PS.getAll();
      const pm={};photos.forEach(p=>pm[p.id]={data:p.data,name:p.name||''});
      const blob=new Blob([JSON.stringify({...data,_photos:pm,_backupType:'full',_backupDate:new Date().toISOString()},null,2)],{type:'application/json'});
      _dl(blob,`thermovisit-completo-${dateStr}.json`);
      markBackup();showToast(`✅ Backup completo baixado! (${(blob.size/1024/1024).toFixed(1)} MB)`);
    }else{
      const blob=new Blob([JSON.stringify({...data,_backupType:'data-only',_backupDate:new Date().toISOString()},null,2)],{type:'application/json'});
      _dl(blob,`thermovisit-dados-${dateStr}.json`);
      markBackup();showToast(`✅ Backup de dados baixado! (${(blob.size/1024).toFixed(0)} KB)`);
    }
  };
  const getBackupPreview=async file=>{
    try{
      const txt=await file.text();const bk=JSON.parse(txt);
      const photoCount=bk._photos?Object.keys(bk._photos).length:0;
      return{
        valid:!!bk.clients,
        clients:bk.clients?.length||0,
        products:bk.products?.length||0,
        visits:bk.visits?.length||0,
        orders:bk.orders?.length||0,
        leads:bk.leads?.length||0,
        photoCount,
        backupType:bk._backupType||'full',
        backupDate:bk._backupDate||null,
        raw:bk
      };
    }catch{return{valid:false};}
  };
  const importBackup=async bk=>{
    try{
      const{_photos,...appData}=bk;
      if(!appData.clients)throw new Error('invalid');
      if(_photos){
        showToast('⏳ Restaurando fotos...');
        for(const[id,p]of Object.entries(_photos))await PS.save(id,p.data,p.name);
      }
      setData(normalizeDataState(appData));
      markBackup();showToast('✅ Backup restaurado com sucesso!');
    }catch{showToast('⚠️ Arquivo inválido');}
  };

  return{data,toast,showToast,addCat,editCat,delCat,addET,editET,delET,addPC,editPC,delPC,addCST,editCST,delCST,addProduct,editProduct,delProduct,addClient,editClient,delClient,addEnv,editEnv,delEnv,updateStatus,addVisit,delVisit,addOrder,editOrder,delOrder,addReferral,editReferral,delReferral,addLead,editLead,delLead,convertLead,payCommission,saveCompany,saveRepresentative,exportBackup,getBackupPreview,importBackup,cloudCfg,saveCloudConfig,pullFromCloud,pushToCloud,syncState,cleanupOrphanPhotos};
}

/* ─── HELPERS ────────────────────────────────────────────────────────────── */
const fd=s=>s?new Date(s).toLocaleDateString('pt-BR'):'—';
const ft=s=>s?new Date(s).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
const gurl=(lat,lng)=>`https://maps.google.com/?q=${lat},${lng}`;
const fmtMoney=v=>'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const PAY_LABELS={avista:'À Vista',parcelado:'Parcelado',financiamento:'Financiamento bancário'};
const PAY_CLASS={avista:'pay-avista',parcelado:'pay-parcelado',financiamento:'pay-financiamento'};
const ORDER_STATUS={pago:'status-pago',pendente:'status-pendente',cancelado:'status-cancelado'};
const ORDER_STATUS_LABEL={pago:'✅ Pago',pendente:'⏳ Pendente',cancelado:'❌ Cancelado'};
function maskPhone(v){const d=v.replace(/\D/g,'').slice(0,11);if(d.length<=2)return d;if(d.length<=6)return`(${d.slice(0,2)}) ${d.slice(2)}`;if(d.length<=10)return`(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;return`(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;}
function maskCNPJ(v){const d=v.replace(/\D/g,'').slice(0,14);if(d.length<=2)return d;if(d.length<=5)return`${d.slice(0,2)}.${d.slice(2)}`;if(d.length<=8)return`${d.slice(0,2)}.${d.slice(2,5)}.${d.slice(5)}`;if(d.length<=12)return`${d.slice(0,2)}.${d.slice(2,5)}.${d.slice(5,8)}/${d.slice(8)}`;return`${d.slice(0,2)}.${d.slice(2,5)}.${d.slice(5,8)}/${d.slice(8,12)}-${d.slice(12)}`;}
function cpText(t,cb){if(navigator.clipboard)navigator.clipboard.writeText(t).then(cb).catch(()=>{fb(t);cb();});else{fb(t);cb();}}
function fb(t){const e=document.createElement('textarea');e.value=t;document.body.appendChild(e);e.select();document.execCommand('copy');document.body.removeChild(e);}
function sendWhatsapp(text){window.open(`https://wa.me/?text=${encodeURIComponent(text)}`,'_blank');}
const calUrl=(cl,v)=>{const dt=new Date(v.date);const s=dt.toISOString().replace(/[-:]/g,'').split('.')[0];const e=new Date(dt.getTime()+3600000).toISOString().replace(/[-:]/g,'').split('.')[0];return`https://calendar.google.com/calendar/r/eventedit?text=${encodeURIComponent('Visita '+cl.name)}&dates=${s}/${e}&details=${encodeURIComponent(v.notes)}&location=${encodeURIComponent(cl.address||cl.city||'')}`;};

/* ─── PRINT (Blob approach) ──────────────────────────────────────────────── */
function openPrint(title,bodyHtml,company,rep){
  const co=company||{};const r=rep||{};
  const hdr=co.name?`<div style="border-bottom:2px solid #0f4523;margin-bottom:12px;padding-bottom:10px;display:flex;justify-content:space-between"><div><div style="font-size:16px;font-weight:bold;color:#0f4523">${co.name}</div>${co.cnpj?`<div style="font-size:10px;color:#666">CNPJ: ${co.cnpj}</div>`:''}${co.phone?`<div style="font-size:10px;color:#666">📞 ${co.phone}</div>`:''}</div><div style="text-align:right;font-size:10px;color:#666">${r.name?`Rep.: <b>${r.name}</b><br>`:''}${r.cities?.length?`Região: ${r.cities.join(', ')}`:''}</div></div>`:'';
  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>${title}</title><style>body{font-family:Arial,sans-serif;font-size:12px;margin:24px;color:#111}h1{font-size:16px;margin-bottom:4px;color:#0f4523}.sub{font-size:10px;color:#888;margin-bottom:14px}table{width:100%;border-collapse:collapse;margin-bottom:16px}th{background:#0f4523;color:#fff;padding:6px 8px;text-align:left;font-size:11px}td{padding:5px 8px;border-bottom:1px solid #e0e0e0;font-size:11px}tr:nth-child(even)td{background:#f5f9f5}.total-row td{font-weight:bold;background:#e8f5ee!important}.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:bold}.bg{background:#d1fae5;color:#065f46}.bb{background:#dbeafe;color:#1e40af}.bp{background:#ede9fe;color:#5b21b6}.footer{margin-top:20px;font-size:10px;color:#aaa;border-top:1px solid #ddd;padding-top:8px}@media print{button{display:none}}</style></head><body>${hdr}<h1>📄 ${title}</h1><div class="sub">Gerado em ${new Date().toLocaleString('pt-BR')}</div>${bodyHtml}<div class="footer">${co.name||'Caixeiro Viajante'}</div><script>setTimeout(()=>window.print(),400);<\/script></body></html>`;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const w=window.open(url,'_blank');
  setTimeout(()=>URL.revokeObjectURL(url),15000);
  if(!w){
    const iframe=document.createElement('iframe');
    iframe.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px';
    document.body.appendChild(iframe);
    iframe.contentDocument.open();iframe.contentDocument.write(html);iframe.contentDocument.close();
    setTimeout(()=>{iframe.contentWindow.print();setTimeout(()=>document.body.removeChild(iframe),2000);},500);
  }
}
function toWA(title,lines,co,rep){
  const h=co?.name?`*${co.name}*${co.phone?' | 📞 '+co.phone:''}${rep?.name?'\nRep: *'+rep.name+'*':''}${rep?.cities?.length?' | '+rep.cities.slice(0,3).join(', ')+(rep.cities.length>3?'…':''):''}\n${'─'.repeat(28)}\n`:'';
  return`${h}*${title}*\n_${new Date().toLocaleString('pt-BR')}_\n\n${lines.join('\n')}\n\n${'─'.repeat(28)}\n_Caixeiro Viajante_`;
}

function PhotoUploader({photoIds,onChange,label,contextName}){
  const ref=useRef(null);const [lb,setLb]=useState(null);const [previews,setPreviews]=useState({});
  const [saving,setSaving]=useState(false);const [saveProgress,setSaveProgress]=useState('');
  useEffect(()=>{(photoIds||[]).forEach(id=>{if(!previews[id])PS.get(id).then(d=>{if(d)setPreviews(p=>({...p,[id]:d}));});});},[photoIds]);
  const handle=async files=>{
    const newIds=[];
    for(const f of files){
      if(!f.type.startsWith('image/'))continue;
      const id=uuid();
      const data=await compressImage(f);
      await PS.save(id,data,f.name);
      setPreviews(p=>({...p,[id]:data}));
      newIds.push(id);
    }
    onChange([...(photoIds||[]),...newIds]);
  };
  const remove=async id=>{await PS.del(id);setPreviews(p=>{const n={...p};delete n[id];return n;});onChange((photoIds||[]).filter(x=>x!==id));};
  const saveSingleToGallery=async(id)=>{

    const ts=new Date().toISOString().replace(/[-:T]/g,'').slice(0,15);

    const filename=`thermovisit_${prefix}_${ts}.jpg`;

    if(result==='downloaded')setSaveProgress('📥 Foto salva em Downloads!');
    else setSaveProgress('✅ Foto compartilhada!');
    setTimeout(()=>setSaveProgress(''),3000);
  };
  const saveAllToGallery=async()=>{
    if(!photoIds||!photoIds.length)return;
    setSaving(true);setSaveProgress(`Salvando 1 de ${photoIds.length}...`);
    const prefix=(contextName||'fotos').replace(/[^a-z0-9]/gi,'_').toLowerCase().slice(0,20);
    const n=await saveAllPhotosToGallery(photoIds,prefix,(done,total)=>setSaveProgress(`Salvando ${done} de ${total}...`));
    setSaving(false);setSaveProgress(`✅ ${n} foto(s) salvas!`);
    setTimeout(()=>setSaveProgress(''),4000);
  };
  return(
    <div>
      {label&&<div className="stitle" style={{marginBottom:8}}>{label}</div>}
      <div className="photo-grid">
        {(photoIds||[]).map(id=>(
          <div key={id} style={{position:'relative'}}>
            <img src={previews[id]||''} className="photo-thumb" onClick={()=>previews[id]&&setLb({src:previews[id],id})} alt="" style={{background:'var(--bg)'}}/>
            <button onClick={()=>remove(id)} style={{position:'absolute',top:3,right:3,background:'rgba(0,0,0,.6)',color:'#fff',borderRadius:'50%',width:20,height:20,fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',border:'none',cursor:'pointer'}}>✕</button>
          </div>
        ))}
        <div className="photo-upload" onClick={()=>ref.current.click()}><span style={{fontSize:22}}>📷</span><span>Adicionar</span></div>
      </div>
      {photoIds&&photoIds.length>0&&(
        <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
          <button className="btn bg bs" onClick={saveAllToGallery} disabled={saving} style={{fontSize:12}}>
            {saving?'⏳ Salvando...':'📥 Salvar todas na galeria'}
          </button>
        </div>
      )}
      {saveProgress&&<div style={{fontSize:12,color:'var(--primary)',fontWeight:600,marginTop:5}}>{saveProgress}</div>}
      <input ref={ref} type="file" accept="image/*" multiple capture="environment" style={{display:'none'}} onChange={e=>handle(Array.from(e.target.files))}/>
      {lb&&(
        <div className="lightbox" onClick={()=>setLb(null)}>
          <img src={lb.src} alt="" onClick={e=>e.stopPropagation()}/>
          <div style={{display:'flex',gap:10}} onClick={e=>e.stopPropagation()}>
            <button className="btn bg" style={{color:'#fff',borderColor:'rgba(255,255,255,.3)'}} onClick={()=>setLb(null)}>✕ Fechar</button>
            <button className="btn bp" style={{fontSize:13}} onClick={()=>saveSingleToGallery(lb.id)}>📥 Salvar na galeria</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── MAP ────────────────────────────────────────────────────────────────── */
function MapPicker({initLat,initLng,onSave,onCancel}){
  const divRef=useRef(null);const mapRef=useRef(null);const mrkRef=useRef(null);
  const myDotRef=useRef(null);const myCircRef=useRef(null);const watchRef=useRef(null);
  const [coords,setCoords]=useState(initLat&&initLng?{lat:+initLat,lng:+initLng}:null);
  const [myPos,setMyPos]=useState(null);const [tracking,setTracking]=useState(false);
  const [gpsErr,setGpsErr]=useState(null);const [loading,setLoading]=useState(true);
  const mkIco=()=>L.divIcon({className:'',html:`<div style="width:30px;height:30px;background:#1a6b3a;border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,.45)"></div>`,iconSize:[30,30],iconAnchor:[15,30]});
  const placePin=(lat,lng,map)=>{
    const r={lat:+lat.toFixed(6),lng:+lng.toFixed(6)};setCoords(r);const m=map||mapRef.current;if(!m)return;
    if(mrkRef.current){mrkRef.current.setLatLng([lat,lng]);}
    else{const mk=L.marker([lat,lng],{icon:mkIco(),draggable:true}).addTo(m);mrkRef.current=mk;mk.on('dragend',()=>{const p=mk.getLatLng();setCoords({lat:+p.lat.toFixed(6),lng:+p.lng.toFixed(6)});setTracking(false);});}
  };
  const updateDot=(lat,lng,acc,map)=>{
    const m=map||mapRef.current;if(!m)return;
    if(myDotRef.current){myDotRef.current.setLatLng([lat,lng]);myCircRef.current?.setLatLng([lat,lng]).setRadius(acc);}
    else{myDotRef.current=L.circleMarker([lat,lng],{radius:9,color:'#fff',weight:2,fillColor:'#2563eb',fillOpacity:1,className:'live-dot'}).addTo(m);if(acc>5)myCircRef.current=L.circle([lat,lng],{radius:acc,color:'#2563eb',fillColor:'#2563eb',fillOpacity:.08,weight:1}).addTo(m);}
  };
  useEffect(()=>{
    if(!divRef.current||mapRef.current)return;
    const map=L.map(divRef.current,{zoomControl:true}).setView([initLat?+initLat:-15.78,initLng?+initLng:-47.93],initLat?15:5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© CARTO',maxZoom:19}).addTo(map);
    mapRef.current=map;
    if(initLat&&initLng)placePin(+initLat,+initLng,map);
    map.on('click',e=>{placePin(e.latlng.lat,e.latlng.lng,map);setTracking(false);});
    if(navigator.geolocation){
      watchRef.current=navigator.geolocation.watchPosition(
        pos=>{const{latitude:lat,longitude:lng,accuracy:acc}=pos.coords;setMyPos({lat,lng,acc});updateDot(lat,lng,acc,map);setLoading(false);setCoords(prev=>{if(!prev&&!initLat){placePin(lat,lng,map);map.setView([lat,lng],17);}return prev;});},
        err=>{setGpsErr(err.code===1?'Permissão negada':'GPS indisponível');setLoading(false);},
        {enableHighAccuracy:true,maximumAge:3000,timeout:15000}
      );
    }else{setGpsErr('GPS não suportado');setLoading(false);}
    return()=>{map.remove();mapRef.current=null;mrkRef.current=null;myDotRef.current=null;myCircRef.current=null;if(watchRef.current!=null)navigator.geolocation.clearWatch(watchRef.current);};
  },[]);
  useEffect(()=>{if(!tracking||!myPos||!mapRef.current)return;mapRef.current.setView([myPos.lat,myPos.lng],17);},[tracking,myPos]);
  const useMine=()=>{if(!myPos)return;placePin(myPos.lat,myPos.lng);mapRef.current?.setView([myPos.lat,myPos.lng],17);setTracking(true);};
  return(
    <div className="mapov">
      <div className="maphdr"><button className="hbtn" onClick={onCancel}>✕</button><span className="maphdr-t">📍 Selecionar Localização</span></div>
      <div style={{background:myPos?'#e8f5ee':'#fef3c7',borderBottom:'1px solid #d1e7d4',padding:'7px 14px',display:'flex',alignItems:'center',gap:8,flexShrink:0,fontSize:13}}>
        <span style={{fontSize:16}}>{loading?'⏳':myPos?'📡':'⚠️'}</span>
        <span style={{fontWeight:600,color:myPos?'#0f4523':'#92400e',flex:1}}>{loading?'Buscando GPS…':gpsErr||(myPos?`±${Math.round(myPos.acc||0)}m`:'Sem GPS')}</span>
        {myPos&&<button onClick={()=>setTracking(x=>!x)} style={{background:tracking?'#1a6b3a':'transparent',color:tracking?'#fff':'#1a6b3a',border:'1.5px solid #1a6b3a',borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:700,cursor:'pointer'}}>{tracking?'🎯 Seguindo':'🎯 Seguir'}</button>}
      </div>
      <div style={{position:'relative',flex:1,minHeight:0}}>
        <div ref={divRef} style={{width:'100%',height:'100%'}}/>
        {myPos&&<button onClick={useMine} style={{position:'absolute',bottom:14,right:14,zIndex:510,background:'#fff',border:'2px solid var(--primary)',borderRadius:12,padding:'9px 14px',fontSize:13,fontWeight:700,color:'var(--primary)',display:'flex',alignItems:'center',gap:6,boxShadow:'0 2px 10px rgba(0,0,0,.18)',cursor:'pointer'}}>📍 Marcar minha posição</button>}
      </div>
      <div className="mapftr">
        <div className="mapcoords">{coords?`✅ ${coords.lat}, ${coords.lng}  —  arraste para ajustar`:'Toque no mapa ou use "Marcar minha posição"'}</div>
        <div style={{display:'flex',gap:8}}><button className="btn bg" style={{flex:1}} onClick={onCancel}>Cancelar</button><button className="btn bp" style={{flex:2,opacity:coords?1:.4}} disabled={!coords} onClick={()=>onSave(coords)}>✅ Salvar localização</button></div>
      </div>
    </div>
  );
}

  const fFinancing=useMemo(()=>data.orders.filter(o=>o.paymentType==='financiamento'&&(!statusFilter||o.finStatus===statusFilter)),[data.orders,statusFilter]);
  const fLeads=useMemo(()=>data.leads.filter(l=>!catFilter||data.referrals.find(r=>r.id===l.referralId)?.id===catFilter),[data.leads,catFilter]);
  const totalO=fOrders.reduce((a,o)=>a+(o.total||0),0);
  const getClient=id=>data.clients.find(c=>c.id===id);
  const getReferral=id=>data.referrals.find(r=>r.id===id);

  const printOrders=()=>{
    const rows=fOrders.map(o=>{const cl=getClient(o.clientId);const env=cl?.environments.find(e=>e.id===o.envId);const pc={avista:'badge bg',parcelado:'badge bb',financiamento:'badge bp'}[o.paymentType]||'badge';return`<tr><td>${fd(o.date)}</td><td>${cl?.name||'—'}</td><td>${env?.label||'—'}</td><td><span class="${pc}">${PAY_LABELS[o.paymentType]}</span></td><td>${ORDER_STATUS_LABEL[o.status]||o.status||'—'}</td><td>${(o.items||[]).length}</td><td><b>${fmtMoney(o.total)}</b></td></tr>`;}).join('');
    openPrint('Relatório de Pedidos',`<table><thead><tr><th>Data</th><th>Cliente</th><th>Ambiente</th><th>Pagamento</th><th>Status</th><th>Itens</th><th>Total</th></tr></thead><tbody>${rows}<tr class="total-row"><td colspan="6"><b>Total (${fOrders.length})</b></td><td><b>${fmtMoney(totalO)}</b></td></tr></tbody></table>`,co,rep);
  };
  const waOrders=()=>{const lines=fOrders.map(o=>{const cl=getClient(o.clientId);return`📦 *${cl?.name||'—'}* — ${fd(o.date)}\n   💳 ${PAY_LABELS[o.paymentType]} | ${ORDER_STATUS_LABEL[o.status]||'—'} | 💰 ${fmtMoney(o.total)}`;});lines.push(`\n💰 *Total: ${fmtMoney(totalO)}* (${fOrders.length} pedidos)`);sendWhatsapp(toWA('Relatório de Pedidos',lines,co,rep));};

  const printClients=()=>{
    const rows=fClients.map(c=>{const cat=data.categories.find(x=>x.id===c.categoryId);const st=c.activityStatus||{};const ints=[st.bioPellets&&'Bio Pellets',st.cavaco&&'Cavaco',st.briquete&&'Briquete',st.pellets&&'Pellets'].filter(Boolean).join(', ')||'—';return`<tr><td>${c.name}</td><td>${c.phone1}</td><td>${c.city||'—'}</td><td>${cat?.name||'—'}</td><td>${ints}</td></tr>`;}).join('');
    openPrint(`Clientes (${fClients.length})`,`<table><thead><tr><th>Nome</th><th>Telefone</th><th>Cidade</th><th>Categoria</th><th>Interesses</th></tr></thead><tbody>${rows}</tbody></table>`,co,rep);
  };
  const waClients=()=>{const lines=fClients.map(c=>{const cat=data.categories.find(x=>x.id===c.categoryId);return`👤 *${c.name}* — ${cat?.name||'—'}\n   📞 ${c.phone1}${c.city?' | 📍 '+c.city:''}`;});sendWhatsapp(toWA(`Clientes (${fClients.length})`,lines,co,rep));};

  const printVisits=()=>{
    const rows=fVisits.map(v=>{const cl=getClient(v.clientId);return`<tr><td>${fd(v.date)} ${ft(v.date)}</td><td>${cl?.name||'—'}</td><td>${v.notes}</td><td>${v.nextContact?fd(v.nextContact+'T00:00'):'—'}</td></tr>`;}).join('');
    openPrint(`Visitas (${fVisits.length})`,`<table><thead><tr><th>Data</th><th>Cliente</th><th>Notas</th><th>Próx. Contato</th></tr></thead><tbody>${rows}</tbody></table>`,co,rep);
  };

  const FIN_STATUS=[['pendente','⏳ Em análise'],['aprovado','✅ Aprovado'],['reprovado','❌ Reprovado'],['liberado','🏦 Liberado']];
  const printFinancing=()=>{
    const rows=fFinancing.map(o=>{const cl=getClient(o.clientId);const sl={pendente:'Em análise',aprovado:'Aprovado',reprovado:'Reprovado',liberado:'Liberado'}[o.finStatus]||'—';return`<tr><td>${fd(o.date)}</td><td>${cl?.name||'—'}</td><td>${cl?.phone1||'—'}</td><td>${sl}</td><td>${o.installments||'—'}×</td><td><b>${fmtMoney(o.total)}</b></td></tr>`;}).join('');
    openPrint('Financiamentos',`<table><thead><tr><th>Data</th><th>Cliente</th><th>Telefone</th><th>Status</th><th>Parcelas</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table>`,co,rep);
  };

  const printLeads=()=>{
    const rows=fLeads.map(l=>{const ref=getReferral(l.referralId);return`<tr><td>${fd(l.createdAt)}</td><td>${l.name}</td><td>${l.phone}</td><td>${l.reference||'—'}</td><td>${l.referralName||ref?.name||'—'}</td><td>${l.status==='converted'?'✅ Convertido':'🔵 Ativo'}</td><td>${l.lat?`${(+l.lat).toFixed(5)}, ${(+l.lng).toFixed(5)}`:'—'}</td></tr>`;}).join('');
    openPrint(`Pré-cadastros / Leads (${fLeads.length})`,`<table><thead><tr><th>Data</th><th>Nome</th><th>Telefone</th><th>Referência</th><th>Indicado por</th><th>Status</th><th>GPS</th></tr></thead><tbody>${rows}</tbody></table>`,co,rep);
  };
  const waLeads=()=>{const lines=fLeads.map(l=>{const ref=getReferral(l.referralId);return`📋 *${l.name}* — ${l.phone}\n   📍 ${l.reference||'—'} | 🤝 ${ref?.name||'—'}\n   ${l.status==='converted'?'✅ Convertido':'🔵 Ativo'}`;});sendWhatsapp(toWA(`Pré-cadastros (${fLeads.length})`,lines,co,rep));};

  return(<>
    <Hdr title="📊 Relatórios"/>
    <div className="content">
      <div className="tabs">
        {[['orders','📦 Pedidos'],['clients','👥 Clientes'],['visits','📋 Visitas'],['financing','🏦 Financiam.'],['leads','📋 Pré-cadastros']].map(([k,l])=><div key={k} className={`tab${type===k?' on':''}`} onClick={()=>setType(k)}>{l}</div>)}
      </div>

      {type==='orders'&&(<div>
        <div className="sbox"><div className="sbox-title">🔎 Filtros</div>
          <div className="row2"><div className="field"><label>Data Início</label><input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/></div><div className="field"><label>Data Fim</label><input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}/></div></div>
          <div className="row2">
            <div className="field"><label>Pagamento</label><select value={payFilter} onChange={e=>setPayFilter(e.target.value)}><option value="">Todos</option><option value="avista">À Vista</option><option value="parcelado">Parcelado</option><option value="financiamento">Financiamento</option></select></div>
            <div className="field"><label>Status</label><select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}><option value="">Todos</option><option value="pendente">Pendente</option><option value="pago">Pago</option><option value="cancelado">Cancelado</option></select></div>
          </div>
        </div>
        <div className="summary-box"><div style={{fontSize:12,fontWeight:600,marginBottom:4,opacity:.8}}>TOTAL</div><div style={{fontSize:22,fontWeight:800}}>{fmtMoney(totalO)}</div><div style={{fontSize:13,opacity:.8}}>{fOrders.length} pedido(s)</div></div>
        <div className="export-bar no-print"><button className="btn bp bs" onClick={printOrders}>🖨️ PDF</button><button className="btn bgreen bs" onClick={waOrders}>💬 WhatsApp</button></div>
        {fOrders.map(o=>{const cl=getClient(o.clientId);if(!cl)return null;return(<div key={o.id} className="report-row"><div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontWeight:700}}>{cl.name}</span><span style={{fontSize:12,color:'var(--text3)'}}>{fd(o.date)}</span></div><div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:4}}><span className={`tag ${PAY_CLASS[o.paymentType]||''}`}>{PAY_LABELS[o.paymentType]}</span>{o.status&&<span className={`tag ${ORDER_STATUS[o.status]||''}`}>{ORDER_STATUS_LABEL[o.status]}</span>}</div><div style={{fontWeight:800,fontSize:15,color:'var(--primary)'}}>{fmtMoney(o.total)}</div></div>);})}
      </div>)}

      {type==='clients'&&(<div>
        <div className="sbox"><div className="sbox-title">🔎 Filtros</div>
          <div className="field"><label>Categoria</label><select value={catFilter} onChange={e=>setCatFilter(e.target.value)}><option value="">Todas</option>{data.categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
          <div className="field"><label>Intenção de Compra</label><select value={intentFilter} onChange={e=>setIntentFilter(e.target.value)}><option value="">Todas</option><option value="hasEquip">Já possui equip.</option><option value="bioPellets">Bio Pellets</option><option value="cavaco">Cavaco</option><option value="briquete">Briquete</option><option value="pellets">Pellets</option>{data.customStatusTypes.map(t=><option key={t.id} value={`c_${t.id}`}>{t.label}</option>)}</select></div>
        </div>
        <div className="export-bar no-print"><button className="btn bp bs" onClick={printClients}>🖨️ PDF</button><button className="btn bgreen bs" onClick={waClients}>💬 WhatsApp</button></div>
        <div style={{fontSize:13,color:'var(--text2)',marginBottom:10}}>{fClients.length} cliente(s)</div>
        {fClients.map(c=>{const cat=data.categories.find(x=>x.id===c.categoryId);const st=c.activityStatus||{};const tags=[st.bioPellets&&'Bio Pellets',st.cavaco&&'Cavaco',st.briquete&&'Briquete',st.pellets&&'Pellets'].filter(Boolean);data.customStatusTypes.forEach(t=>{if(st.customFlags?.[t.id])tags.push(t.label);});return(<div key={c.id} className="report-row"><div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{fontWeight:700}}>{c.name}</span>{cat&&<span className="tag" style={{background:'var(--pl)',color:'var(--pd)'}}>{cat.name}</span>}</div><div style={{fontSize:13,color:'var(--text2)',marginBottom:4}}>📞 {c.phone1}{c.city?' | 📍 '+c.city:''}</div>{tags.length>0&&<div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{tags.map((t,i)=><span key={i} className="tag" style={{background:'var(--acl)',color:'var(--accent)'}}>{t}</span>)}</div>}</div>);})}
      </div>)}

      {type==='visits'&&(<div>
        <div className="sbox"><div className="sbox-title">🔎 Por Data</div><div className="row2"><div className="field"><label>Início</label><input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/></div><div className="field"><label>Fim</label><input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}/></div></div></div>
        <div className="export-bar no-print"><button className="btn bp bs" onClick={printVisits}>🖨️ PDF</button><button className="btn bgreen bs" onClick={()=>{const lines=fVisits.map(v=>{const cl=getClient(v.clientId);return`📋 *${cl?.name||'—'}* — ${fd(v.date)} ${ft(v.date)}\n   ${v.notes.slice(0,80)}${v.notes.length>80?'…':''}${v.nextContact?'\n   🔔 '+fd(v.nextContact+'T00:00'):''}`;});sendWhatsapp(toWA('Visitas',lines,co,rep));}}>💬 WhatsApp</button></div>
        {fVisits.map(v=>{const cl=getClient(v.clientId);if(!cl)return null;return(<div key={v.id} className="report-row"><div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{fontWeight:700}}>{cl.name}</span><span style={{fontSize:12,color:'var(--text3)'}}>{fd(v.date)} {ft(v.date)}</span></div><div style={{fontSize:13,color:'var(--text2)',marginBottom:4}}>{v.notes}</div>{v.nextContact&&<div style={{fontSize:12,color:'var(--accent)',fontWeight:600}}>🔔 {fd(v.nextContact+'T00:00')}</div>}</div>);})}
      </div>)}

      {type==='financing'&&(<div>
        <div className="sbox"><div className="sbox-title">🏦 Status do Financiamento</div><div className="field"><label>Filtrar por status</label><select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}><option value="">Todos</option>{FIN_STATUS.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div></div>
        <div className="export-bar no-print"><button className="btn bp bs" onClick={printFinancing}>🖨️ PDF</button></div>
        {fFinancing.map(o=>{const cl=getClient(o.clientId);if(!cl)return null;const sl={pendente:'⏳ Em análise',aprovado:'✅ Aprovado',reprovado:'❌ Reprovado',liberado:'🏦 Liberado'}[o.finStatus]||'⏳ Em análise';return(<div key={o.id} className="order-card"><div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontWeight:700}}>{cl.name}</span><span style={{fontSize:12,color:'var(--text3)'}}>{fd(o.date)}</span></div><div style={{fontSize:13,color:'var(--text2)',marginBottom:4}}>📞 {cl.phone1} | {sl}</div><div style={{fontWeight:800,fontSize:16,color:'var(--primary)',marginBottom:8}}>{fmtMoney(o.total)} — {o.installments}×</div><div className="field" style={{marginBottom:0}}><label>Atualizar status</label><select value={o.finStatus||'pendente'} onChange={e=>store.editOrder(o.id,{...o,finStatus:e.target.value})}>{FIN_STATUS.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div></div>);})}
      </div>)}

      {type==='leads'&&(<div>
        <div className="sbox"><div className="sbox-title">🔎 Filtrar por Indicador</div><div className="field"><select value={catFilter} onChange={e=>setCatFilter(e.target.value)}><option value="">Todos os indicadores</option>{data.referrals.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}</select></div></div>
        <div className="export-bar no-print"><button className="btn bp bs" onClick={printLeads}>🖨️ PDF</button><button className="btn bgreen bs" onClick={waLeads}>💬 WhatsApp</button></div>
        <div style={{fontSize:13,color:'var(--text2)',marginBottom:10}}>{fLeads.length} pré-cadastro(s)</div>
        {fLeads.map(l=>{const ref=getReferral(l.referralId);return(<div key={l.id} className={`lead-card${l.status==='converted'?' ':{border:'1px solid var(--border)'}}`} style={{opacity:l.status==='converted'?.7:1}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{fontWeight:700}}>{l.name}</span><span style={{fontSize:11,color:l.status==='converted'?'var(--primary)':'var(--teal)',fontWeight:700}}>{l.status==='converted'?'✅ Convertido':'🔵 Lead'}</span></div><div style={{fontSize:13,color:'var(--text2)',marginBottom:3}}>📞 {l.phone}{l.reference?` | 📍 ${l.reference}`:''}</div>{(l.referralName||ref?.name)&&<div style={{fontSize:12,color:'var(--text3)'}}>🤝 {l.referralName||ref?.name}</div>}</div>);})}
      </div>)}
    </div>
  </>);
}

/* ─── DASHBOARD ──────────────────────────────────────────────────────────── */
function Dashboard({store,setPage,setClientId}){
  const {data,exportBackup,getBackupPreview,importBackup,showToast,cloudCfg,saveCloudConfig,pullFromCloud,pushToCloud,syncState,cleanupOrphanPhotos}=store;
  const [tab,setTab]=useState('dash');
  const [backupRem,setBackupRem]=useState(false);
  const backupRef=useRef(null);
  const [storageInfo,setStorageInfo]=useState({photos:0,loaded:false});
  const [restorePreview,setRestorePreview]=useState(null);
  const [restoreFile,setRestoreFile]=useState(null);
  const [cloudForm,setCloudForm]=useState(cloudCfg);
  const recent=data.visits.slice(0,3);
  const totalSales=data.orders.filter(o=>o.status==='pago').reduce((a,o)=>a+(o.total||0),0);

  useEffect(()=>{setCloudForm(cloudCfg);},[cloudCfg.workspace,cloudCfg.syncKey,cloudCfg.autoSync]);

  useEffect(()=>{
    const check=()=>{
      const snooze=getBackupSnooze();
      if(snooze&&new Date(snooze).getTime()>Date.now())return;
      const last=getLastBackup();
      if(!last){setBackupRem(true);return;}
      const diff=Date.now()-new Date(last).getTime();
      if(diff>3*60*60*1000)setBackupRem(true);
    };
    const interval=setInterval(check,30*60*1000);check();
    return()=>clearInterval(interval);
  },[]);

  useEffect(()=>{
    if(tab==='data')PS.getSize().then(mb=>setStorageInfo({photos:mb,loaded:true}));
  },[tab]);

  const handleBackup=async(withPhotos=true)=>{await exportBackup(withPhotos);setBackupRem(false);};
  const dismissReminder=()=>{snoozeBackupReminder(3);setBackupRem(false);showToast('⏰ Lembrete adiado por 3 horas.');};
  const handleRestoreFile=async e=>{
    const file=e.target.files[0];if(!file)return;
    e.target.value='';
    const preview=await getBackupPreview(file);
    if(!preview.valid){showToast('⚠️ Arquivo inválido');return;}
    setRestorePreview(preview);setRestoreFile(preview.raw);
  };
  const confirmRestore=async()=>{
    if(!restoreFile)return;
    await importBackup(restoreFile);
    setRestorePreview(null);setRestoreFile(null);
  };
  const lsSize=(()=>{try{const s=localStorage.getItem('cv_v4')||'';return Math.round(s.length*2/1024);}catch{return 0;}})();

  return(<>
    <Hdr title="🧳 ThermoVisit"/>
    <div className="content">
      <div className="tabs">
        <div className={`tab${tab==='dash'?' on':''}`} onClick={()=>setTab('dash')}>🏠 Painel</div>
        <div className={`tab${tab==='data'?' on':''}`} onClick={()=>setTab('data')}>💾 Dados</div>
        <div className={`tab${tab==='config'?' on':''}`} onClick={()=>setTab('config')}>⚙️ Config</div>
      </div>

      {tab==='dash'&&(<>
        <div className="sgrid">
          <div className="scard"><div className="snum">{data.clients.length}</div><div className="slbl">Clientes</div></div>
          <div className="scard"><div className="snum">{data.visits.length}</div><div className="slbl">Visitas</div></div>
          <div className="scard"><div className="snum">{data.orders.length}</div><div className="slbl">Pedidos</div></div>
          <div className="scard"><div className="snum">{data.leads.filter(l=>l.status==='active').length}</div><div className="slbl">Leads</div></div>
        </div>
        {totalSales>0&&<div style={{background:'var(--pd)',color:'#fff',borderRadius:12,padding:'12px 16px',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:13,fontWeight:600}}>💰 Total Vendido (pago)</span><span style={{fontSize:18,fontWeight:800}}>{fmtMoney(totalSales)}</span></div>}
        <div className="qgrid">
          <div className="qbtn" onClick={()=>setPage('clientForm')}><span style={{fontSize:20}}>➕</span><span style={{fontWeight:700,fontSize:13}}>Novo Cliente</span></div>
          <div className="qbtn" onClick={()=>setPage('clients')}><span style={{fontSize:20}}>👥</span><span style={{fontWeight:700,fontSize:13}}>Clientes</span><span style={{fontSize:11,color:'var(--text3)'}}>{data.clients.length}</span></div>
          <div className="qbtn" onClick={()=>setPage('orderForm')}><span style={{fontSize:20}}>🛒</span><span style={{fontWeight:700,fontSize:13}}>Novo Pedido</span></div>
          <div className="qbtn" onClick={()=>setPage('visits')}><span style={{fontSize:20}}>📋</span><span style={{fontWeight:700,fontSize:13}}>Visitas</span><span style={{fontSize:11,color:'var(--text3)'}}>{data.visits.length}</span></div>
          <div className="qbtn" onClick={()=>setPage('reports')}><span style={{fontSize:20}}>📊</span><span style={{fontWeight:700,fontSize:13}}>Relatórios</span></div>
          <div className="qbtn" onClick={()=>setPage('productForm')}><span style={{fontSize:20}}>📦</span><span style={{fontWeight:700,fontSize:13}}>Novo Produto</span></div>
        </div>
        <div className="shdr"><h3>Últimas Visitas</h3><button className="btn bo bs" onClick={()=>setPage('visits')}>Ver todas</button></div>
        {recent.length===0&&<div className="empty"><div style={{fontSize:36}}>📋</div><div style={{fontWeight:600,color:'var(--text2)',marginTop:8}}>Nenhuma visita ainda</div></div>}
        {recent.map(v=>{const cl=data.clients.find(c=>c.id===v.clientId);if(!cl)return null;return(<div key={v.id} className="vi" style={{cursor:'pointer'}} onClick={()=>{setClientId(cl.id);setPage('clientDetail')}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{fontWeight:700}}>{cl.name}</span><span style={{fontSize:12,color:'var(--text3)'}}>{fd(v.date)}</span></div><div style={{fontSize:13,color:'var(--text2)'}}>{v.notes.slice(0,80)}{v.notes.length>80?'…':''}</div>{v.nextContact&&<div style={{fontSize:12,color:'var(--accent)',fontWeight:600,marginTop:4}}>🔔 {fd(v.nextContact+'T00:00')}</div>}</div>);})}
      </>)}

      {tab==='data'&&(<div>
        <div style={{background:'var(--pl)',border:'1px solid #b7d9c4',borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{fontWeight:700,color:'var(--pd)',marginBottom:8,fontSize:14}}>💾 Armazenamento no dispositivo</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <div style={{background:'#fff',borderRadius:9,padding:'10px 12px',border:'1px solid var(--border)'}}>
              <div style={{fontSize:11,color:'var(--text3)',fontWeight:600,marginBottom:3}}>DADOS (texto)</div>
              <div style={{fontSize:17,fontWeight:800,color:'var(--pd)'}}>{lsSize} KB</div>
              <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>localStorage</div>
            </div>
            <div style={{background:'#fff',borderRadius:9,padding:'10px 12px',border:'1px solid var(--border)'}}>
              <div style={{fontSize:11,color:'var(--text3)',fontWeight:600,marginBottom:3}}>FOTOS</div>
              <div style={{fontSize:17,fontWeight:800,color:'var(--pd)'}}>{storageInfo.loaded?`${storageInfo.photos} MB`:'…'}</div>
              <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>IndexedDB</div>
            </div>
          </div>
          <div style={{fontSize:12,color:'var(--text2)',marginTop:8,lineHeight:1.5}}>Dados salvos automaticamente. Fotos comprimidas ao adicionar (max 1280px).</div>
        </div>
        <div className="cc" style={{marginBottom:10}}>
          <div style={{fontWeight:700,marginBottom:4,fontSize:14}}>☁️ Nuvem (Supabase via Vercel)</div>
          <div style={{fontSize:13,color:'var(--text2)',marginBottom:12,lineHeight:1.5}}>Sincroniza os dados de texto com a nuvem usando a API hospedada na Vercel. As fotos continuam locais neste build e seguem cobertas pelo backup completo em JSON.</div>
          <div className="field"><label>Workspace</label><input value={cloudForm.workspace||''} onChange={e=>setCloudForm(f=>({...f,workspace:e.target.value}))} placeholder="principal"/></div>
          <div className="field"><label>Chave de sincronização</label><input type="password" value={cloudForm.syncKey||''} onChange={e=>setCloudForm(f=>({...f,syncKey:e.target.value}))} placeholder="Defina a mesma chave na Vercel"/></div>

                <button className="btn bg" style={{flex:1}} onClick={()=>setRestorePreview(null)}>Cancelar</button>
                <button className="btn bd" style={{flex:1}} onClick={confirmRestore}>✅ Restaurar agora</button>
              </div>
            </div>
          </div>
        )}
      </div>)}

      {tab==='config'&&<ConfigPage store={store}/>}
    </div>
    {backupRem&&<BackupReminder onBackup={handleBackup} onDismiss={dismissReminder}/>}
  </>);
}

function ProductForm({store,setPage,editId,clearEdit}){

/* ─── VISITS ─────────────────────────────────────────────────────────────── */
function VisitModal({store,clientId,onClose}){
  const {addVisit,showToast}=store;const now=new Date();const pad=n=>String(n).padStart(2,'0');
  const def=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const [f,setF]=useState({date:def,notes:'',nextContact:''});const s=(k,v)=>setF(x=>({...x,[k]:v}));
  const go=()=>{if(!f.notes){showToast('⚠️ Notas obrigatórias');return;}addVisit({clientId,date:f.date,notes:f.notes,nextContact:f.nextContact});showToast('✅ Visita registrada');onClose();};
  return(<div className="ov" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}><div className="mhdl"/><div className="mtitle">📋 Registrar Visita</div><div className="row2"><div className="field"><label>Data e Hora</label><input type="datetime-local" value={f.date} onChange={e=>s('date',e.target.value)}/></div><div className="field"><label>Próx. Contato</label><input type="date" value={f.nextContact} onChange={e=>s('nextContact',e.target.value)}/></div></div><div className="field"><label>Notas *</label><textarea value={f.notes} onChange={e=>s('notes',e.target.value)} placeholder="O que foi visto, discutido…" style={{minHeight:90}}/></div><div className="cbar"><button className="btn bg" style={{flex:1}} onClick={onClose}>Cancelar</button><button className="btn bp" style={{flex:1}} onClick={go}>💾 Salvar</button></div></div></div>);
}

    <div className="cc" style={{marginBottom:12}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>{editId?'Editar Pré-cadastro':'Novo Pré-cadastro'}</div>
      <div className="field"><label>Nome *</label><input value={form.name} onChange={e=>sf('name',e.target.value)} placeholder="Nome do prospecto"/></div>
      <div className="field"><label>Telefone</label><input value={form.phone} onChange={e=>sf('phone',maskPhone(e.target.value))} placeholder="(XX) XXXXX-XXXX" inputMode="tel"/></div>
      <div className="field"><label>Ponto de Referência</label><input value={form.reference} onChange={e=>sf('reference',e.target.value)} placeholder="Ex: Próximo ao silo da comunidade"/></div>
      <div className="field"><label>Indicado por</label><select value={form.referralId} onChange={e=>sf('referralId',e.target.value)}><option value="">Nenhum indicador</option>{data.referrals.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}</select></div>
      <div className="field"><label>Observações</label><textarea value={form.notes} onChange={e=>sf('notes',e.target.value)} placeholder="Interesse, potencial, observações…" style={{minHeight:60}}/></div>
      {/* GPS */}
      <button onClick={()=>setShowMap(true)} style={{background:form.lat?'var(--primary)':'var(--pl)',color:form.lat?'#fff':'var(--pd)',border:'1.5px solid var(--primary)',borderRadius:10,padding:'10px 14px',display:'flex',alignItems:'center',gap:8,fontSize:14,fontWeight:700,width:'100%',justifyContent:'center',cursor:'pointer',marginBottom:8,minHeight:44}}>
        <span style={{fontSize:18}}>🗺️</span>{form.lat?`📍 ${(+form.lat).toFixed(4)}, ${(+form.lng).toFixed(4)} — Alterar`:'Marcar localização GPS'}
      </button>
      <div className="cbar">{editId&&<button className="btn bg" style={{flex:1}} onClick={reset}>Cancelar</button>}<button className="btn bteal" style={{flex:editId?1:'100%'}} onClick={submit}>{editId?'💾 Salvar':'➕ Cadastrar Lead'}</button></div>
    </div>

    <div className="stitle">Leads Ativos ({active.length})</div>
    {active.length===0&&<div style={{fontSize:13,color:'var(--text3)',marginBottom:10}}>Nenhum lead ativo.</div>}
    {active.map(l=>{
      const ref=data.referrals.find(r=>r.id===l.referralId);
      return(<div key={l.id} className="lead-card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}><div><div style={{fontWeight:800,fontSize:15}}>{l.name}</div><div style={{fontSize:13,color:'var(--text2)'}}>{l.phone&&`📞 ${l.phone}`}</div></div><div style={{display:'flex',gap:5}}><button className="btn bg bs" onClick={()=>startEdit(l)}>✏️</button><button className="btn bg bs" style={{color:'var(--danger)'}} onClick={()=>setConf(l.id)}>🗑️</button></div></div>
        {l.reference&&<div style={{fontSize:13,color:'var(--text2)',marginBottom:4}}>📍 {l.reference}</div>}
        {(l.referralName||ref?.name)&&<div style={{fontSize:12,color:'var(--teal)',fontWeight:600,marginBottom:4}}>🤝 Indicado por: {l.referralName||ref?.name}</div>}
        {l.notes&&<div style={{fontSize:12,color:'var(--text3)',marginBottom:8,fontStyle:'italic'}}>{l.notes}</div>}
        {l.lat&&l.lng&&<div style={{fontSize:11,color:'var(--text3)',marginBottom:8,fontFamily:'monospace'}}>GPS: {(+l.lat).toFixed(5)}, {(+l.lng).toFixed(5)}</div>}
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <button className="btn bp bs" onClick={()=>doConvert(l.id)}>✅ Converter para Cliente</button>
          {l.lat&&l.lng&&<button className="btn bg bs" onClick={()=>window.open(gurl(l.lat,l.lng),'_blank')}>🗺️</button>}
        </div>
      </div>);
    })}

    {converted.length>0&&(<><div className="stitle" style={{marginTop:14}}>Convertidos ({converted.length})</div>
    {converted.map(l=>{const ref=data.referrals.find(r=>r.id===l.referralId);const cl=data.clients.find(c=>c.id===l.convertedClientId);return(<div key={l.id} className="cc" style={{opacity:.7}}><div style={{fontWeight:600}}>{l.name} <span style={{fontSize:12,color:'var(--primary)',fontWeight:700}}>✅ Convertido</span></div>{cl&&<div style={{fontSize:12,color:'var(--text2)'}}>→ Cliente: {cl.name}</div>}{(l.referralName||ref?.name)&&<div style={{fontSize:11,color:'var(--text3)'}}>🤝 {l.referralName||ref?.name}</div>}</div>);})}</>)}

    {conf&&<Confirm msg="Excluir pré-cadastro?" onOk={()=>{delLead(conf);setConf(null);showToast('Removido');}} onCancel={()=>setConf(null)}/>}
    {showMap&&<MapPicker initLat={form.lat} initLng={form.lng} onSave={({lat,lng})=>{sf('lat',lat);sf('lng',lng);setShowMap(false);showToast('📍 Localização salva!');}} onCancel={()=>setShowMap(false)}/>}
  </div>);
}

/* ─── COMMISSIONS PANEL ──────────────────────────────────────────────────── */
function CommissionsPanel({store}){
  const {data,payCommission,showToast}=store;
  const [filterRef,setFilterRef]=useState('');const [filterStatus,setFilterStatus]=useState('');
  const comms=data.commissions.filter(c=>{if(filterRef&&c.referralId!==filterRef)return false;if(filterStatus&&c.status!==filterStatus)return false;return true;});
  const totalPend=comms.filter(c=>c.status==='pendente').reduce((a,c)=>a+c.amount,0);
  const totalPago=comms.filter(c=>c.status==='paga').reduce((a,c)=>a+c.amount,0);
  return(<div>
    <div style={{background:'var(--purplel)',borderRadius:12,padding:14,marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:600,color:'var(--purple)',marginBottom:8,textTransform:'uppercase',letterSpacing:'.05em'}}>💰 Resumo de Comissões</div>
      <div className="row2">
        <div style={{textAlign:'center',background:'#fff',borderRadius:8,padding:8}}><div style={{fontWeight:800,fontSize:16,color:'#92400e'}}>{fmtMoney(totalPend)}</div><div style={{fontSize:11,color:'var(--text3)'}}>Pendente</div></div>
        <div style={{textAlign:'center',background:'#fff',borderRadius:8,padding:8}}><div style={{fontWeight:800,fontSize:16,color:'var(--primary)'}}>{fmtMoney(totalPago)}</div><div style={{fontSize:11,color:'var(--text3)'}}>Pago</div></div>
      </div>
    </div>
    <div className="sbox">
      <div className="row2">
        <div className="field"><label>Indicador</label><select value={filterRef} onChange={e=>setFilterRef(e.target.value)}><option value="">Todos</option>{data.referrals.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}</select></div>
        <div className="field"><label>Status</label><select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}><option value="">Todos</option><option value="pendente">Pendente</option><option value="paga">Paga</option></select></div>
      </div>
    </div>
    {comms.length===0&&<div style={{fontSize:13,color:'var(--text3)',textAlign:'center',padding:20}}>Nenhuma comissão encontrada.<br/><span style={{fontSize:12}}>Comissões são geradas ao marcar um pedido como "Pago".</span></div>}
    {comms.map(c=>(
      <div key={c.id} className="comm-card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:5}}>
          <div><div style={{fontWeight:700,fontSize:14}}>{c.referralName}</div><div style={{fontSize:12,color:'var(--text2)'}}>Cliente: {c.clientName}</div><div style={{fontSize:11,color:'var(--text3)'}}>{fd(c.orderDate)} · Pedido total: {fmtMoney(c.orderTotal||0)}</div></div>
          <div style={{textAlign:'right'}}><div style={{fontWeight:800,fontSize:16,color:'var(--primary)'}}>{fmtMoney(c.amount)}</div><span className={c.status==='paga'?'comm-paga':'comm-pendente'}>{c.status==='paga'?'✅ Paga':'⏳ Pendente'}</span></div>
        </div>
        {c.status==='paga'&&c.paidAt&&<div style={{fontSize:11,color:'var(--text3)'}}>Pago em: {fd(c.paidAt)}</div>}
        {c.status==='pendente'&&(
          <button className="btn bp bs" style={{marginTop:8,width:'100%'}} onClick={()=>{payCommission(c.id);showToast('✅ Comissão marcada como paga!');}}>💰 Marcar como Paga (Baixa)</button>
        )}
      </div>
    ))}
    <div style={{fontSize:12,color:'var(--text3)',marginTop:10,padding:10,background:'var(--bg)',borderRadius:8}}>ℹ️ Comissões pagas são registradas como "baixa" mas nunca excluídas do histórico.</div>
  </div>);
}

/* ─── APP ROOT ───────────────────────────────────────────────────────────── */
function App(){
  const store=useStore();
  const [page,setPage]=useState(getInitialPage());
  const [clientId,setClientId]=useState(null);
  const [editId,setEditId]=useState(null);
  const [editProductId,setEditProductId]=useState(null);
  const [editOrderId,setEditOrderId]=useState(null);
  useEffect(()=>{try{const url=new URL(window.location.href);if(page==='home')url.searchParams.delete('page');else url.searchParams.set('page',page);window.history.replaceState({},'',url);}catch{}},[page]);
  const go=p=>{setPage(p);if(!['clientForm','clientDetail','productForm','orderForm','empresa'].includes(p)){setEditId(null);setEditProductId(null);setEditOrderId(null);}};
  const render=()=>{
    switch(page){
      case 'home':return<Dashboard store={store} setPage={go} setClientId={setClientId}/>;
      case 'clients':return<ClientsList store={store} setPage={go} setClientId={setClientId} setEditId={setEditId}/>;
      case 'clientForm':return<ClientForm store={store} setPage={go} editId={editId} clearEdit={()=>setEditId(null)}/>;
      case 'clientDetail':return<ClientDetail store={store} clientId={clientId} setPage={go} setEditId={setEditId} setEditOrderId={setEditOrderId}/>;
      case 'visits':return<VisitsList store={store} setPage={go} setClientId={setClientId}/>;
      case 'products':return<ProductsList store={store} setPage={go} setEditProductId={setEditProductId}/>;
      case 'productForm':return<ProductForm store={store} setPage={go} editId={editProductId} clearEdit={()=>setEditProductId(null)}/>;
      case 'orders':return<OrdersList store={store} setPage={go} setClientId={setClientId} setEditOrderId={setEditOrderId}/>;
      case 'orderForm':return<OrderForm store={store} setPage={go} editId={editOrderId} clearEdit={()=>setEditOrderId(null)}/>;
      case 'reports':return<ReportsPage store={store}/>;
      case 'empresa':return<EmpresaPage store={store} setPage={go} setClientId={setClientId}/>;
      default:return<Dashboard store={store} setPage={go} setClientId={setClientId}/>;
    }
  };
  return<>{render()}<Nav page={page} go={go}/><Toast msg={store.toast}/></>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
